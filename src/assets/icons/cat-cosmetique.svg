<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="4">
  <!-- Lipstick base (lower tube) -->
  <rect x="72" y="115" width="56" height="65" rx="3" stroke="#007AFF"/>
  <!-- Decorative band on base -->
  <line x1="72" y1="135" x2="128" y2="135" stroke="#00BFA5"/>
  <line x1="72" y1="160" x2="128" y2="160" stroke="#00BFA5"/>
  <!-- Middle ring (where cap meets) -->
  <rect x="76" y="100" width="48" height="15" stroke="#007AFF"/>
  <!-- Lipstick holder cylinder (open, cap removed) -->
  <rect x="80" y="70" width="40" height="30" stroke="#007AFF"/>
  <!-- Bullet of lipstick (angled tip) -->
  <path d="M82 70 L82 38 Q82 30 90 28 L118 22 Q120 22 120 24 L120 70 Z" stroke="#00BFA5" fill="#00BFA5" fill-opacity="0.25"/>
</svg>
