<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="4">
  <!-- Square luxury bottle body -->
  <rect x="55" y="75" width="90" height="105" rx="4" stroke="#007AFF"/>
  <!-- Shoulders/neck base -->
  <path d="M70 75 L70 60 L130 60 L130 75" stroke="#007AFF"/>
  <!-- Neck -->
  <rect x="86" y="42" width="28" height="18" stroke="#007AFF"/>
  <!-- Sprayer cap (top) -->
  <rect x="78" y="22" width="44" height="20" rx="2" stroke="#00BFA5" fill="#00BFA5" fill-opacity="0.18"/>
  <!-- Sprayer nozzle button -->
  <rect x="92" y="14" width="16" height="8" rx="1" stroke="#00BFA5"/>
  <!-- Label -->
  <rect x="72" y="110" width="56" height="48" stroke="#00BFA5" fill="#00BFA5" fill-opacity="0.1"/>
  <line x1="82" y1="128" x2="118" y2="128" stroke="#00BFA5" stroke-width="2"/>
  <line x1="88" y1="142" x2="112" y2="142" stroke="#00BFA5" stroke-width="2"/>
</svg>
