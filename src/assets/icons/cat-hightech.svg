  <!-- App grid hint -->
  <rect x="78" y="50" width="18" height="18" rx="3" stroke="#00BFA5"/>
  <rect x="104" y="50" width="18" height="18" rx="3" stroke="#00BFA5"/>
  <rect x="78" y="76" width="18" height="18" rx="3" stroke="#00BFA5"/>
  <rect x="104" y="76" width="18" height="18" rx="3" stroke="#00BFA5"/>
  <!-- Side button -->
