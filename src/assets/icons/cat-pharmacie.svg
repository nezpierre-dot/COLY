<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="5">
  <!-- Pill capsule (diagonal) -->
  <g transform="translate(100 100) rotate(-35) translate(-100 -100)">
    <rect x="50" y="80" width="100" height="40" rx="20" stroke="#007AFF"/>
    <line x1="100" y1="80" x2="100" y2="120" stroke="#007AFF"/>
    <path d="M100 80 H150 Q150 120 100 120 Z" stroke="#00BFA5" fill="none"/>
  </g>
  <!-- Cross pharmacy badge -->
  <rect x="135" y="135" width="50" height="50" rx="6" stroke="#00BFA5"/>
  <line x1="160" y1="145" x2="160" y2="175" stroke="#00BFA5"/>
  <line x1="145" y1="160" x2="175" y2="160" stroke="#00BFA5"/>
</svg>
