<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="6">
  <!-- Cigarettes peeking out from the top of the open flap -->
  <!-- Tall cigarette (left) -->
  <rect x="68" y="14" width="10" height="34" rx="1.5" stroke="#007AFF"/>
  <!-- Filter tip on tall cigarette -->
  <line x1="68" y1="22" x2="78" y2="22" stroke="#00BFA5" stroke-width="3"/>
  <!-- Short cigarettes group -->
  <line x1="90" y1="30" x2="90" y2="48" stroke="#007AFF"/>
  <line x1="100" y1="26" x2="100" y2="48" stroke="#007AFF"/>
  <line x1="110" y1="32" x2="110" y2="48" stroke="#007AFF"/>
  <line x1="120" y1="28" x2="120" y2="48" stroke="#007AFF"/>

  <!-- Pack body (Marlboro-style rectangle with rounded bottom) -->
  <path d="M50 48 L50 178 Q50 186 58 186 L142 186 Q150 186 150 178 L150 48 L130 48 L130 56 L70 56 L70 48 Z" stroke="#007AFF"/>

  <!-- Top inner shadow / opening line -->
  <line x1="70" y1="56" x2="130" y2="56" stroke="#007AFF" stroke-width="3"/>

  <!-- Iconic chevron "roof" (Marlboro red triangle) -->
  <path d="M50 160 L100 100 L150 160 Z" stroke="#00BFA5" fill="#00BFA5" fill-opacity="0.18" stroke-width="6"/>
</svg>
