<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="4">
  <!-- Cigarette pack body (Marlboro style) -->
  <rect x="55" y="45" width="90" height="130" rx="6" stroke="#007AFF"/>
  <!-- Top lid line -->
  <line x1="55" y1="68" x2="145" y2="68" stroke="#007AFF"/>
  <!-- Red roof chevron (Marlboro) -->
  <path d="M55 130 L100 95 L145 130" stroke="#00BFA5" fill="#00BFA5" fill-opacity="0.2"/>
  <!-- Brand text bar -->
  <rect x="72" y="143" width="56" height="14" rx="1" stroke="#00BFA5"/>
  <line x1="80" y1="150" x2="120" y2="150" stroke="#00BFA5" stroke-width="2"/>
</svg>
