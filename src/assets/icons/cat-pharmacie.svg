<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="4">
  <!-- Medicine box (rectangular pharma carton) -->
  <rect x="35" y="50" width="130" height="100" rx="3" stroke="#007AFF"/>
  <!-- Top fold line -->
  <line x1="35" y1="72" x2="165" y2="72" stroke="#007AFF"/>
  <!-- Medical cross badge -->
  <rect x="55" y="88" width="40" height="40" rx="3" stroke="#00BFA5" fill="#00BFA5" fill-opacity="0.15"/>
  <line x1="75" y1="98" x2="75" y2="118" stroke="#00BFA5" stroke-width="4"/>
  <line x1="65" y1="108" x2="85" y2="108" stroke="#00BFA5" stroke-width="4"/>
  <!-- Brand text lines -->
  <line x1="108" y1="92" x2="152" y2="92" stroke="#00BFA5" stroke-width="2"/>
  <line x1="108" y1="104" x2="148" y2="104" stroke="#00BFA5" stroke-width="2"/>
  <line x1="108" y1="116" x2="144" y2="116" stroke="#00BFA5" stroke-width="2"/>
  <line x1="108" y1="128" x2="138" y2="128" stroke="#00BFA5" stroke-width="2"/>
  <!-- Capsules below box -->
  <rect x="50" y="160" width="44" height="18" rx="9" stroke="#007AFF"/>
  <line x1="72" y1="160" x2="72" y2="178" stroke="#00BFA5"/>
  <rect x="106" y="160" width="44" height="18" rx="9" stroke="#007AFF" transform="rotate(8 128 169)"/>
</svg>
