<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="4">
  <!-- Medicine box (paracetamol-style carton) -->
  <rect x="30" y="36" width="140" height="92" rx="3" stroke="#007AFF"/>
  <!-- Top fold line -->
  <line x1="30" y1="56" x2="170" y2="56" stroke="#007AFF" stroke-width="2"/>
  <!-- Side fold line -->
  <line x1="150" y1="36" x2="150" y2="128" stroke="#007AFF" stroke-width="2" stroke-dasharray="3 3"/>

  <!-- Medical cross badge -->
  <rect x="44" y="68" width="36" height="36" rx="3" stroke="#00BFA5" fill="#00BFA5" fill-opacity="0.18"/>
  <line x1="62" y1="76" x2="62" y2="96" stroke="#00BFA5" stroke-width="5"/>
  <line x1="52" y1="86" x2="72" y2="86" stroke="#00BFA5" stroke-width="5"/>

  <!-- Brand text lines (right side) -->
  <line x1="92" y1="72" x2="142" y2="72" stroke="#007AFF" stroke-width="3"/>
  <line x1="92" y1="84" x2="134" y2="84" stroke="#00BFA5" stroke-width="2"/>
  <line x1="92" y1="94" x2="138" y2="94" stroke="#00BFA5" stroke-width="2"/>
  <!-- Dosage badge -->
  <rect x="92" y="104" width="34" height="14" rx="2" stroke="#00BFA5"/>

  <!-- BLISTER PACK (plaquette) below box -->
  <!-- Aluminum backing -->
  <rect x="32" y="142" width="136" height="44" rx="4" stroke="#007AFF" fill="hsl(var(--background))"/>
  <!-- Capsule bubbles (2 rows x 5) -->
  <!-- Row 1 -->
  <rect x="40" y="148" width="22" height="14" rx="7" stroke="#00BFA5" fill="#00BFA5" fill-opacity="0.15"/>
  <line x1="51" y1="148" x2="51" y2="162" stroke="#00BFA5" stroke-width="1.5"/>
  <rect x="66" y="148" width="22" height="14" rx="7" stroke="#00BFA5" fill="#00BFA5" fill-opacity="0.15"/>
  <line x1="77" y1="148" x2="77" y2="162" stroke="#00BFA5" stroke-width="1.5"/>
  <rect x="92" y="148" width="22" height="14" rx="7" stroke="#00BFA5" fill="#00BFA5" fill-opacity="0.15"/>
  <line x1="103" y1="148" x2="103" y2="162" stroke="#00BFA5" stroke-width="1.5"/>
  <rect x="118" y="148" width="22" height="14" rx="7" stroke="#00BFA5" fill="#00BFA5" fill-opacity="0.15"/>
  <line x1="129" y1="148" x2="129" y2="162" stroke="#00BFA5" stroke-width="1.5"/>
  <rect x="144" y="148" width="20" height="14" rx="7" stroke="#00BFA5" fill="#00BFA5" fill-opacity="0.15"/>
  <line x1="154" y1="148" x2="154" y2="162" stroke="#00BFA5" stroke-width="1.5"/>
  <!-- Row 2 -->
  <rect x="40" y="166" width="22" height="14" rx="7" stroke="#00BFA5" fill="#00BFA5" fill-opacity="0.15"/>
  <line x1="51" y1="166" x2="51" y2="180" stroke="#00BFA5" stroke-width="1.5"/>
  <rect x="66" y="166" width="22" height="14" rx="7" stroke="#00BFA5" fill="#00BFA5" fill-opacity="0.15"/>
  <line x1="77" y1="166" x2="77" y2="180" stroke="#00BFA5" stroke-width="1.5"/>
  <rect x="92" y="166" width="22" height="14" rx="7" stroke="#00BFA5" fill="#00BFA5" fill-opacity="0.15"/>
  <line x1="103" y1="166" x2="103" y2="180" stroke="#00BFA5" stroke-width="1.5"/>
  <rect x="118" y="166" width="22" height="14" rx="7" stroke="#00BFA5" fill="#00BFA5" fill-opacity="0.15"/>
  <line x1="129" y1="166" x2="129" y2="180" stroke="#00BFA5" stroke-width="1.5"/>
  <rect x="144" y="166" width="20" height="14" rx="7" stroke="#00BFA5" fill="#00BFA5" fill-opacity="0.15"/>
  <line x1="154" y1="166" x2="154" y2="180" stroke="#00BFA5" stroke-width="1.5"/>
</svg>
