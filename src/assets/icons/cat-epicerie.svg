<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="5">
  <!-- Chocolate bar outline (squarish) -->
  <rect x="40" y="22" width="120" height="156" rx="4" stroke="#007AFF"/>

  <!-- Top portion: 3x3 grid of chocolate squares (each with inner L-shape detail) -->
  <!-- Vertical grid dividers -->
  <line x1="80" y1="30" x2="80" y2="125" stroke="#007AFF"/>
  <line x1="120" y1="30" x2="120" y2="125" stroke="#007AFF"/>
  <!-- Horizontal grid dividers -->
  <line x1="48" y1="62" x2="152" y2="62" stroke="#007AFF"/>
  <line x1="48" y1="94" x2="152" y2="94" stroke="#007AFF"/>
  <line x1="48" y1="125" x2="152" y2="125" stroke="#007AFF"/>

  <!-- Inner L-shape highlights inside each square (top-left bevel) -->
  <!-- Row 1 -->
  <path d="M52 58 L52 38 L72 38" stroke="#00BFA5" stroke-width="3"/>
  <path d="M88 58 L88 38 L112 38" stroke="#00BFA5" stroke-width="3"/>
  <path d="M128 58 L128 38 L148 38" stroke="#00BFA5" stroke-width="3"/>
  <!-- Row 2 -->
  <path d="M52 90 L52 70 L72 70" stroke="#00BFA5" stroke-width="3"/>
  <path d="M88 90 L88 70 L112 70" stroke="#00BFA5" stroke-width="3"/>
  <path d="M128 90 L128 70 L148 70" stroke="#00BFA5" stroke-width="3"/>
  <!-- Row 3 -->
  <path d="M52 121 L52 101 L72 101" stroke="#00BFA5" stroke-width="3"/>
  <path d="M88 121 L88 101 L112 101" stroke="#00BFA5" stroke-width="3"/>
  <path d="M128 121 L128 101 L148 101" stroke="#00BFA5" stroke-width="3"/>

  <!-- Wrapper foil peeled at the bottom (diagonal fold) -->
  <!-- Diagonal line from upper-right of wrapper to lower-left across the bottom area -->
  <path d="M40 138 L160 125 L160 178 L40 178 Z" stroke="#007AFF" fill="hsl(var(--background))"/>
  <!-- Folded triangle highlight on the right -->
  <path d="M160 125 L160 148 L138 138 Z" stroke="#00BFA5" fill="#00BFA5" fill-opacity="0.18" stroke-width="3"/>
</svg>
