  <rect x="128" y="50" width="42" height="42" rx="6" stroke="#00BFA5" fill="#00BFA5" fill-opacity="0.12"/>
  <!-- Watch dial -->
  <circle cx="149" cy="71" r="13" stroke="#00BFA5"/>
