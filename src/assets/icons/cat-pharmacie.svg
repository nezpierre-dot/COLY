<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="5">
  <!-- BLISTER PACK (tilted slightly left, large, occupies most of canvas) -->
  <g transform="rotate(-12 100 100)">
    <!-- Outer aluminum backing with notched top corners -->
    <path d="M50 38 L80 28 L150 28 L150 172 L50 172 Z" stroke="#007AFF" fill="hsl(var(--background))"/>
    <!-- Center vertical divider -->
    <line x1="100" y1="40" x2="100" y2="162" stroke="#007AFF" stroke-width="3"/>

    <!-- Pill bubbles (4 rows x 2 columns) -->
    <!-- Row 1 -->
    <circle cx="75" cy="58" r="10" stroke="#007AFF" fill="hsl(var(--background))"/>
    <circle cx="75" cy="58" r="4" stroke="#00BFA5" fill="#00BFA5" fill-opacity="0.25"/>
    <circle cx="125" cy="58" r="10" stroke="#007AFF" fill="hsl(var(--background))"/>
    <circle cx="125" cy="58" r="4" stroke="#00BFA5" fill="#00BFA5" fill-opacity="0.25"/>
    <!-- Row 2 -->
    <circle cx="75" cy="88" r="10" stroke="#007AFF" fill="hsl(var(--background))"/>
    <circle cx="75" cy="88" r="4" stroke="#00BFA5" fill="#00BFA5" fill-opacity="0.25"/>
    <circle cx="125" cy="88" r="10" stroke="#007AFF" fill="hsl(var(--background))"/>
    <circle cx="125" cy="88" r="4" stroke="#00BFA5" fill="#00BFA5" fill-opacity="0.25"/>
    <!-- Row 3 -->
    <circle cx="75" cy="118" r="10" stroke="#007AFF" fill="hsl(var(--background))"/>
    <circle cx="75" cy="118" r="4" stroke="#00BFA5" fill="#00BFA5" fill-opacity="0.25"/>
    <circle cx="125" cy="118" r="10" stroke="#007AFF" fill="hsl(var(--background))"/>
    <circle cx="125" cy="118" r="4" stroke="#00BFA5" fill="#00BFA5" fill-opacity="0.25"/>
    <!-- Row 4 -->
    <circle cx="75" cy="148" r="10" stroke="#007AFF" fill="hsl(var(--background))"/>
    <circle cx="75" cy="148" r="4" stroke="#00BFA5" fill="#00BFA5" fill-opacity="0.25"/>
    <circle cx="125" cy="148" r="10" stroke="#007AFF" fill="hsl(var(--background))"/>
    <circle cx="125" cy="148" r="4" stroke="#00BFA5" fill="#00BFA5" fill-opacity="0.25"/>
  </g>

  <!-- DETACHED CAPSULE (red & white, bottom-right, in front) -->
  <g transform="rotate(35 150 160)">
    <!-- Capsule body (rounded rectangle) -->
    <rect x="118" y="148" width="64" height="24" rx="12" stroke="#007AFF" fill="hsl(var(--background))"/>
    <!-- Mid divider line between halves -->
    <line x1="150" y1="148" x2="150" y2="172" stroke="#007AFF"/>
    <!-- Red half (left) filled with teal accent -->
    <path d="M130 148 Q118 148 118 160 Q118 172 130 172 L150 172 L150 148 Z" stroke="#007AFF" fill="#00BFA5" fill-opacity="0.28"/>
  </g>
</svg>
